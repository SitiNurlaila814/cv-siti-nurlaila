<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Certificates</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<!-- WRAPPER CENTER -->
<div class="w-full max-w-md mx-auto">

    <!-- CARD -->
    <div class="bg-white shadow-xl rounded-2xl p-6 md:p-8 text-center hover:shadow-2xl transition duration-300">

        <!-- Title -->
        <h2 class="text-2xl md:text-3xl font-bold text-pink-500 mb-6">
            My Certificates
        </h2>

        <!-- LIST CERTIFICATE -->
        <div class="space-y-4 text-left">

            <!-- Certificate 1 -->
            <div class="bg-pink-50 rounded-xl p-4 border border-pink-200 flex items-center gap-4 hover:shadow-md transition">
                <div class="text-2xl">🏆</div>
                <div>
                    <h3 class="text-base font-semibold text-gray-800">
                        Sertifikat Piala Rektor 2024
                    </h3>
                    <p class="text-xs text-gray-500">
                        Divisi Acara
                    </p>
                </div>
            </div>

            <!-- Certificate 2 -->
            <div class="bg-pink-50 rounded-xl p-4 border border-pink-200 flex items-center gap-4 hover:shadow-md transition">
                <div class="text-2xl">📜</div>
                <div>
                    <h3 class="text-base font-semibold text-gray-800">
                        Sertifikat Porskam 2025
                    </h3>
                    <p class="text-xs text-gray-500">
                        Divisi Konsumsi
                    </p>
                </div>
            </div>

        </div>

        <!-- Highlight -->
        <div class="mt-6 bg-pink-50 p-4 rounded-lg border border-pink-200">
            <p class="text-xs md:text-sm text-gray-600">
                📚 Sertifikat ini menunjukkan komitmen saya dalam meningkatkan skill dan kompetensi
            </p>
        </div>

    </div>

</div>

</body>
</html>
