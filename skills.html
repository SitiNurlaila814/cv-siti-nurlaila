<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Skills</title>

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

<!-- WRAPPER -->
<div class="w-full max-w-md mx-auto">

    <!-- CARD -->
    <div class="bg-white shadow-xl rounded-2xl p-6 md:p-8 text-center hover:shadow-2xl transition duration-300">

        <!-- Title -->
        <h2 class="text-2xl md:text-3xl font-bold text-pink-500 mb-6">
            My Skills
        </h2>

        <!-- Skills -->
        <div class="space-y-5 text-left">

            <!-- Skill 1 -->
            <div>
                <div class="flex justify-between mb-1">
                    <span class="font-semibold text-gray-700">Mengelola Data</span>
                    <span class="text-sm text-gray-500">80%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div class="bg-pink-500 h-3 rounded-full" style="width:85%"></div>
                </div>
            </div>

            <!-- Skill 2 -->
            <div>
                <div class="flex justify-between mb-1">
                    <span class="font-semibold text-gray-700">Microsoft Excel</span>
                    <span class="text-sm text-gray-500">70%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div class="bg-pink-400 h-3 rounded-full" style="width:75%"></div>
                </div>
            </div>

            <!-- Skill 3 -->
            <div>
                <div class="flex justify-between mb-1">
                    <span class="font-semibold text-gray-700">Badminton</span>
                    <span class="text-sm text-gray-500">80%</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-3">
                    <div class="bg-pink-300 h-3 rounded-full" style="width:80%"></div>
                </div>
            </div>

        </div>

        <!-- Info -->
        <div class="mt-6 bg-pink-50 p-4 rounded-lg border border-pink-200">
            <p class="text-sm text-gray-600">
                🚀 Terus belajar dan mengembangkan skill 
            </p>
        </div>

    </div>

</div>

</body>
</html>
